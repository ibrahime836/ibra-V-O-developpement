name: Build Capacitor Android APK

on:
  release:
    types: [published]
  workflow_dispatch: {}
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: ${{ runner.temp }}/android-sdk
      ANDROID_HOME: ${{ runner.temp }}/android-sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK cmdline-tools and components
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y unzip curl
          mkdir -p "$ANDROID_SDK_ROOT"
          cd /tmp
          curl -sS -o commandlinetools.zip https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools.zip
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          mv cmdline-tools/* "$ANDROID_SDK_ROOT/cmdline-tools/latest/"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$ANDROID_SDK_ROOT" --licenses || true
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$ANDROID_SDK_ROOT" --licenses || true
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$ANDROID_SDK_ROOT" "platform-tools" "platforms;android-33" "build-tools;33.0.2"

      - name: Prepare web dir
        run: |
          mkdir -p mobile/www
          rsync -a --exclude='.git' --exclude='.github' --exclude='node_modules' ./ mobile/www/

      - name: Init npm and install Capacitor
        run: |
          cd mobile
          npm init -y
          npm install @capacitor/core @capacitor/cli

      - name: Capacitor init & add android
        run: |
          cd mobile
          npx cap init "IbraV" com.ibrahim.ibra --web-dir=www || true
          npx cap add android || true
          npx cap copy android || true
          ls -la android || true

      - name: Sync Android & Gradle prepare
        run: |
          cd mobile
          npx cap sync android || true
          cd android
          ./gradlew --version

      - name: Build Android APK
        run: |
          cd mobile/android
          ./gradlew assembleDebug

      - name: Debug - list outputs
        run: |
          ls -R mobile/android/app/build/outputs || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload APK to Release
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          asset_name: app-debug.apk
          asset_content_type: application/vnd.android.package-archive
