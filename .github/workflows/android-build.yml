name: Build Capacitor Android APK

on:
  release:
    types: [published]
  workflow_dispatch: {}
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  ANDROID_HOME: /usr/local/android-sdk
  ANDROID_SDK_ROOT: /usr/local/android-sdk

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: r0adkll/setup-android@v2
        with:
          api-level: 33
          build-tools: 33.0.2

      - name: Accept Android SDK licenses
        run: |
          if [ -x "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" ]; then
            yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses
          elif [ -x "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" ]; then
            yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses
          fi

      - name: Prepare web dir
        run: |
          mkdir -p mobile/www
          rsync -a --exclude='.git' --exclude='.github' --exclude='node_modules' ./ mobile/www/

      - name: Init npm and install Capacitor
        run: |
          cd mobile
          npm init -y
          npm install @capacitor/core @capacitor/cli

      - name: Capacitor init & add android
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
        run: |
          cd mobile
          npx cap init "IbraV" com.ibrahim.ibra --web-dir=www || true
          npx cap add android || true
          npx cap copy android || true
          ls -la android || true

      - name: Sync Android & Gradle prepare
        run: |
          cd mobile
          npx cap sync android || true
          cd android
          ./gradlew --version

      - name: Build Android APK
        run: |
          cd mobile/android
          ./gradlew assembleDebug

      - name: Debug - list outputs
        run: |
          ls -R mobile/android/app/build/outputs || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload APK to Release
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          asset_name: app-debug.apk
          asset_content_type: application/vnd.android.package-archive
